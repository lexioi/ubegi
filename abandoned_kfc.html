// ── WALL TEXTURES ────────────────────────────────────────────────
function mkWall(baseR,baseG,baseB,lineR,lineG,lineB){
  const ot=document.createElement('canvas');ot.width=64;ot.height=64;
  const ox=ot.getContext('2d');
  ox.fillStyle=`rgb(${baseR},${baseG},${baseB})`;ox.fillRect(0,0,64,64);
  ox.fillStyle=`rgb(${lineR},${lineG},${lineB})`;
  for(let row=0;row<8;row++){
    const off=(row%2===0)?0:8;
    for(let col=0;col<5;col++){
      ox.fillRect(col*16+off,row*8,14,6);
    }
    ox.fillRect(0,row*8+6,64,2);
  }
  // grunge
  ox.fillStyle='rgba(0,0,0,0.15)';
  for(let i=0;i<120;i++){
    ox.fillRect(Math.random()*64,Math.random()*64,Math.random()*3,Math.random()*3);
  }
  return ot;
}

// Burger positions
const BURGERS=[];
function placeBurgers(){
  BURGERS.length=0;
  const cands=[];
  for(let y=1;y<MH-1;y++)for(let x=1;x<MW-1;x++){
    if(MAP[y][x]===0&&!(x<=2&&y<=2)){cands.push({x:x+0.5,y:y+0.5,got:false});}
  }
  // shuffle
  for(let i=cands.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cands[i],cands[j]]=[cands[j],cands[i]];}
  cands.slice(0,BURGER_GOAL).forEach(b=>BURGERS.push(b));
}

// ── COLLISION ────────────────────────────────────────────────────
function walkable(x,y){
  const M=0.22;
  const corners=[[x-M,y-M],[x+M,y-M],[x-M,y+M],[x+M,y+M]];
  for(const[cx,cy]of corners){
    const mx=Math.floor(cx),my=Math.floor(cy);
    if(mx<0||mx>=MW||my<0||my>=MH)return false;
    const t=MAP[my][mx];
    if(t===1||t===2)return false;
  }
  return true;
}

// ── LINE OF SIGHT ────────────────────────────────────────────────
function los(x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,steps=Math.ceil(Math.sqrt(dx*dx+dy*dy)/0.4);
  for(let i=1;i<steps;i++){
    const tx=x1+dx*i/steps,ty=y1+dy*i/steps;
    const t=MAP[Math.floor(ty)]?.[Math.floor(tx)]??1;
    if(t===1||t===2)return false;
  }
  return true;
}

// ── RAYCASTING ───────────────────────────────────────────────────
function castRays(){
  // Ceiling gradient
  const cg=ctx.createLinearGradient(0,0,0,H/2);
  cg.addColorStop(0,'#0a0a0a');cg.addColorStop(1,'#1e1010');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H/2);
  // Floor
  const fg=ctx.createLinearGradient(0,H/2,0,H);
  fg.addColorStop(0,'#2a1e10');fg.addColorStop(1,'#150e06');
  ctx.fillStyle=fg;ctx.fillRect(0,H/2,W,H);

  for(let ray=0;ray<NR;ray++){
    const ra=P.angle-HFOV+(ray/NR)*FOV;
    const sinA=Math.sin(ra),cosA=Math.cos(ra);
    let mx=Math.floor(P.x),my=Math.floor(P.y);
    const ddx=Math.abs(1/cosA),ddy=Math.abs(1/sinA);
    let sx,sdx,sy,sdy;
    if(cosA<0){sx=-1;sdx=(P.x-mx)*ddx;}else{sx=1;sdx=(mx+1-P.x)*ddx;}
    if(sinA<0){sy=-1;sdy=(P.y-my)*ddy;}else{sy=1;sdy=(my+1-P.y)*ddy;}
    let hit=false,side=0,wtype=0,dist=MAXD;
    for(let d=0;d<MAXD&&!hit;d++){
      if(sdx<sdy){sdx+=ddx;mx+=sx;side=0;}else{sdy+=ddy;my+=sy;side=1;}
      if(my>=0&&my<MH&&mx>=0&&mx<MW){wtype=MAP[my][mx];if(wtype>=1)hit=true;}
    }
    if(hit){
      dist=side===0?(mx-P.x+(1-sx)/2)/cosA:(my-P.y+(1-sy)/2)/sinA;
      dist=Math.abs(dist);
    }
    zBuf[ray]=dist;
    const wh=Math.min(H*2,PDIST/dist);
    const wt=(H-wh)/2;
    const br=Math.max(0,1-dist/MAXD)*(side===1?0.62:1.0);

    // Pick wall texture pixel column
    let texSrc=WALL_A;
    if(wtype===2)texSrc=WALL_B;
    else if(wtype===3)texSrc=WALL_EXIT;

    // Wall hit x for texture
    let wx;
    if(side===0)wx=P.y+dist*sinA;else wx=P.x+dist*cosA;
    wx=wx-Math.floor(wx);
    const texX=Math.floor(wx*64);

    // Draw textured wall slice (sample from texture)
    ctx.drawImage(texSrc,texX,0,1,64,ray,wt,1,wh);

    // Darken by distance
    ctx.fillStyle=`rgba(0,0,0,${1-br})`;
    ctx.fillRect(ray,wt,1,wh);

    // Edge vignette on wall top/bottom
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(ray,wt,1,2);ctx.fillRect(ray,wt+wh-2,1,2);
  }
}

// ── SPRITE RENDERING ─────────────────────────────────────────────
function renderSprites(){
  const all=[];
  for(const e of ENEMIES){
    const dx=e.x-P.x,dy=e.y-P.y;
    all.push({type:'enemy',obj:e,dist:dx*dx+dy*dy,dx,dy});
  }
  for(const b of BURGERS){
    if(b.got)continue;
    const dx=b.x-P.x,dy=b.y-P.y;
    all.push({type:'burger',obj:b,dist:dx*dx+dy*dy,dx,dy});
  }
  all.sort((a,b)=>b.dist-a.dist);

  for(const s of all){
    const{dx,dy}=s;
    const dist=Math.sqrt(s.dist);
    if(dist<0.3)continue;

    // Angle to sprite relative to player view
    let sa=Math.atan2(dy,dx)-P.angle;
    while(sa>Math.PI)sa-=2*Math.PI;
    while(sa<-Math.PI)sa+=2*Math.PI;
    if(Math.abs(sa)>HFOV+0.15)continue;

    const screenX=Math.floor((0.5+sa/FOV)*W);
    let sh,sw;
    if(s.type==='burger'){
      sh=Math.max(10,Math.min(H*0.9,PDIST/dist*0.55));sw=sh;
    }else{
      sh=Math.max(20,Math.min(H*1.4,PDIST/dist*0.95));sw=sh*0.62;
    }
    const st=(H-sh)/2;
    const sl=screenX-sw/2;
    const imgSrc=s.type==='burger'?SPR_BURGER:s.obj.spr;
    const iw=imgSrc.width,ih=imgSrc.height;
    const x0=Math.max(0,Math.floor(sl)),x1=Math.min(W-1,Math.floor(sl+sw));

    // Build clip path for visible (unoccluded) columns
    ctx.save();
    ctx.beginPath();
    let inRun=false;
    for(let sx=x0;sx<=x1;sx++){
      if(dist<zBuf[sx]){
        if(!inRun){ctx.rect(sx,0,1,H);inRun=true;}
        else{ctx.rect(sx,0,1,H);}
      } else inRun=false;
    }
    ctx.clip();
    ctx.drawImage(imgSrc,0,0,iw,ih,sl,st,sw,sh);
    ctx.restore();

    // Angry indicator
    if(s.type==='enemy'&&s.obj.angry&&dist<5){
      const ems=Math.max(12,Math.floor(36/dist));
      ctx.font=`${ems}px Arial`;ctx.textAlign='center';
      ctx.fillText('😡',screenX,st-4);
    }
  }
}

// ── ENEMY AI ─────────────────────────────────────────────────────
function updateEnemies(){
  for(const e of ENEMIES){
    const dx=P.x-e.x,dy=P.y-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const see=dist<8&&los(e.x,e.y,P.x,P.y);

    if(see){e.angry=true;e.st='chase';}
    else if(e.st==='chase'&&dist>10){e.angry=false;e.st='roam';}

    if(e.st==='chase'){
      const ang=Math.atan2(dy,dx);
      const nx=e.x+Math.cos(ang)*e.spd,ny=e.y+Math.sin(ang)*e.spd;
      if(walkable(nx,e.y))e.x=nx;else e.pang+=Math.PI*0.5;
      if(walkable(e.x,ny))e.y=ny;else e.pang+=Math.PI*0.5;
      if(dist<e.cdist&&P.inv<=0){
        P.hp--;P.inv=100;flashT=18;flashC='rgba(220,0,0,0.5)';
        if(P.hp<=0)endGame(false);
      }
    } else {
      e.ptimer--;
      if(e.ptimer<=0){e.ptimer=50+Math.floor(Math.random()*80);e.pang=Math.random()*Math.PI*2;}
      const nx=e.x+Math.cos(e.pang)*e.spd*0.45,ny=e.y+Math.sin(e.pang)*e.spd*0.45;
      if(walkable(nx,e.y))e.x=nx;else e.pang+=Math.PI*0.7;
      if(walkable(e.x,ny))e.y=ny;else e.pang-=Math.PI*0.7;
    }
    // Kristina speeds up as you collect more burgers
    if(e.name==='Кристина')e.spd=0.024+burgersCollected/BURGER_GOAL*0.03;
  }
  if(P.inv>0)P.inv--;
}

// ── BURGER PICKUP ────────────────────────────────────────────────
function checkPickups(){
  for(const b of BURGERS){
    if(b.got)continue;
    const dx=b.x-P.x,dy=b.y-P.y;
    if(dx*dx+dy*dy<0.35*0.35){
      b.got=true;burgersCollected++;
      flashT=12;flashC='rgba(255,200,0,0.28)';
      if(burgersCollected>=BURGER_GOAL){exitMsgT=200;}
    }
  }
  // Exit check
  if(burgersCollected>=BURGER_GOAL){
    const dx=17.5-P.x,dy=18.5-P.y;
    if(dx*dx+dy*dy<0.9*0.9)endGame(true);
  }
}

// ── PLAYER MOVEMENT ──────────────────────────────────────────────
function handleInput(){
  if(K['ArrowLeft']||K['a']||K['A'])P.angle-=P.rot;
  if(K['ArrowRight']||K['d']||K['D'])P.angle+=P.rot;
  let mx=0,my=0;
  if(K['ArrowUp']||K['w']||K['W']){mx=Math.cos(P.angle)*P.spd;my=Math.sin(P.angle)*P.spd;}
  if(K['ArrowDown']||K['s']||K['S']){mx=-Math.cos(P.angle)*P.spd*0.55;my=-Math.sin(P.angle)*P.spd*0.55;}
  if(walkable(P.x+mx,P.y))P.x+=mx;
  if(walkable(P.x,P.y+my))P.y+=my;
  P.bob+=(Math.abs(mx)+Math.abs(my))*60;
}

// ── HUD ──────────────────────────────────────────────────────────
function drawHUD(){
  // Burger counter panel
  ctx.fillStyle='rgba(0,0,0,0.72)';
  ctx.fillRect(8,8,168,44);
  ctx.strokeStyle='#cc0000';ctx.lineWidth=2;
  ctx.strokeRect(8,8,168,44);
  ctx.fillStyle='#ffcc00';ctx.font='bold 24px Oswald,Impact,sans-serif';
  ctx.textAlign='left';
  ctx.fillText(`🍔 ${burgersCollected} / ${BURGER_GOAL}`,16,36);

  // HP
  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(W-108,8,100,44);
  ctx.strokeStyle='#cc0000';ctx.lineWidth=2;ctx.strokeRect(W-108,8,100,44);
  ctx.font='22px Arial';ctx.textAlign='right';
  let hh='';for(let i=0;i<P.maxHp;i++)hh+=i<P.hp?'❤️':'🖤';
  ctx.fillText(hh,W-10,36);

  // Crosshair
  ctx.strokeStyle='rgba(255,255,255,0.65)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W/2-10,H/2);ctx.lineTo(W/2+10,H/2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W/2,H/2-10);ctx.lineTo(W/2,H/2+10);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(W/2,H/2,6,0,Math.PI*2);ctx.stroke();

  // Minimap
  drawMinimap();

  // Exit arrow when all burgers collected
  if(burgersCollected>=BURGER_GOAL){
    const ea=Math.atan2(18.5-P.y,17.5-P.x)-P.angle;
    ctx.save();ctx.translate(W/2,H-34);ctx.rotate(ea);
    ctx.fillStyle='#ff2200';ctx.font='bold 30px Arial';ctx.textAlign='center';
    ctx.fillText('➜',0,10);ctx.restore();
    ctx.fillStyle='#ff2200';ctx.font='bold 14px Oswald,Impact,sans-serif';
    ctx.textAlign='center';ctx.fillText('ВЫХОД',W/2,H-12);
  }

  // Exit unlock message
  if(exitMsgT>0){
    const a=Math.min(1,exitMsgT/30);
    ctx.fillStyle=`rgba(0,0,0,${0.75*a})`;ctx.fillRect(W/2-220,H/2-42,440,72);
    ctx.strokeStyle=`rgba(0,220,0,${a})`;ctx.lineWidth=2;
    ctx.strokeRect(W/2-220,H/2-42,440,72);
    ctx.fillStyle=`rgba(0,255,0,${a})`;ctx.font='bold 22px Oswald,Impact,sans-serif';
    ctx.textAlign='center';ctx.fillText('🚪 ВЫХОД ОТКРЫТ! Найди светящуюся стену!',W/2,H/2-8);
    ctx.font=`16px Oswald,sans-serif`;ctx.fillText('Следуй за красной стрелкой внизу экрана',W/2,H/2+20);
    exitMsgT--;
  }

  // Flash (damage/collect)
  if(flashT>0){
    ctx.fillStyle=flashC;ctx.fillRect(0,0,W,H);flashT--;
  }

  // Invincibility blink
  if(P.inv>0&&P.inv%10<5){
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(0,0,W,H);
  }

  // Hand bob (like Baldi's)
  drawHand();

  // Enemy warning
  for(const e of ENEMIES){
    if(e.angry){
      const dx=e.x-P.x,dy=e.y-P.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<4){
        ctx.fillStyle=`rgba(255,0,0,${Math.max(0,0.4-d*0.08)})`;
        ctx.fillRect(0,0,W,H);
      }
    }
  }
}

function drawHand(){
  const bob=Math.sin(P.bob*0.12)*4;
  ctx.save();ctx.translate(W*0.72+bob*0.5,H-10+Math.abs(bob)*1.5);
  // sleeve
  ctx.fillStyle='#2244aa';
  ctx.beginPath();ctx.ellipse(0,0,55,90,0,0,Math.PI*2);ctx.fill();
  // hand
  ctx.fillStyle='#f5c8a0';
  ctx.beginPath();ctx.ellipse(0,-55,35,45,0,0,Math.PI*2);ctx.fill();
  // fingers
  for(let i=-2;i<=2;i++){
    ctx.beginPath();ctx.ellipse(i*12,-88,9,22,-i*0.12,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawMinimap(){
  const sc=4,mmx=W-MW*sc-8,mmy=H-MH*sc-8;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(mmx-2,mmy-2,MW*sc+4,MH*sc+4);
  ctx.strokeStyle='#cc0000';ctx.lineWidth=1;ctx.strokeRect(mmx-2,mmy-2,MW*sc+4,MH*sc+4);
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    const t=MAP[y][x];
    if(t===1)ctx.fillStyle='#993311';
    else if(t===2)ctx.fillStyle='#885500';
    else if(t===3)ctx.fillStyle='#ffaa00';
    else ctx.fillStyle='rgba(80,55,35,0.4)';
    ctx.fillRect(mmx+x*sc,mmy+y*sc,sc,sc);
  }
  // Burgers
  ctx.fillStyle='#ffdd00';
  for(const b of BURGERS)if(!b.got)ctx.fillRect(mmx+b.x*sc-1,mmy+b.y*sc-1,2,2);
  // Enemies
  for(const e of ENEMIES){
    ctx.fillStyle=e.col;
    ctx.beginPath();ctx.arc(mmx+e.x*sc,mmy+e.y*sc,3,0,Math.PI*2);ctx.fill();
  }
  // Player
  ctx.fillStyle='#00ff44';
  ctx.fillRect(mmx+P.x*sc-2,mmy+P.y*sc-2,5,5);
  ctx.strokeStyle='#00ff44';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(mmx+P.x*sc,mmy+P.y*sc);
  ctx.lineTo(mmx+(P.x+Math.cos(P.angle)*2.5)*sc,mmy+(P.y+Math.sin(P.angle)*2.5)*sc);
  ctx.stroke();
}

// ── PAUSE ────────────────────────────────────────────────────────
let paused=false;
function doPause(){
  if(gs!=='playing')return;
  paused=!paused;
  if(paused)document.exitPointerLock();
}

function drawPause(){
  ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ff3300';ctx.font='bold 52px Oswald,Impact,sans-serif';ctx.textAlign='center';
  ctx.fillText('ПАУЗА',W/2,H/2-20);
  ctx.fillStyle='#aaa';ctx.font='20px Oswald,sans-serif';
  ctx.fillText('Нажми ESC чтобы продолжить',W/2,H/2+25);
  ctx.fillText(`Бургеров: ${burgersCollected}/${BURGER_GOAL}  ♥${P.hp}`,W/2,H/2+55);
}

// ── END GAME ─────────────────────────────────────────────────────
function endGame(win){
  gs=win?'win':'lose';
  document.exitPointerLock();
  const ov=document.getElementById('overlay');
  const min=Math.floor(frameN/3600),sec=Math.floor((frameN%3600)/60);
  ov.innerHTML=win
    ?`<h1>🎉 ГЕРМАН СБЕЖАЛ!</h1>
      <div class="sub">Ты собрал все ${BURGER_GOAL} бургеров и сбежал!<br>
      Кристина, Даня и Толик остались ни с чем 😤<br>
      Время: ${min}м ${sec}с</div>
      <button onclick="location.reload()">🔄 Играть снова</button>`
    :`<h1>💀 ГЕРМАН СЪЕДЕН</h1>
      <div class="sub">Кристина и её банда поймали Германа...<br>
      Собрано бургеров: <b style="color:#ffcc00">${burgersCollected} / ${BURGER_GOAL}</b><br>
      Попробуй ещё раз!</div>
      <button onclick="location.reload()">🔄 Попробовать снова</button>`;
  ov.style.display='flex';
}

// ── MAIN LOOP ────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  if(gs!=='playing')return;
  frameN++;
  if(!paused){
    handleInput();
    updateEnemies();
    checkPickups();
    castRays();
    renderSprites();
    drawHUD();
  } else {
    castRays();renderSprites();drawHUD();drawPause();
  }
}

// ── START ────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('overlay').style.display='none';
  placeBurgers();
  gs='playing';
  c.requestPointerLock();
  loop();
}

// Title preview render
ctx.fillStyle='#0a0000';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#cc0000';ctx.font='bold 38px Oswald,Impact,sans-serif';
ctx.textAlign='center';ctx.fillText('🍗 ЗАБРОШЕННЫЙ KFC 🍗',W/2,H/2-10);
ctx.fillStyle='#666';ctx.font='18px Oswald,sans-serif';
ctx.fillText('Загрузка...',W/2,H/2+30);
</script>
